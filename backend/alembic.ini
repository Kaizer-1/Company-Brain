# Alembic configuration for Company Brain.
# The sqlalchemy.url is overridden at runtime by env.py reading from app.config.settings,
# so the value here is a placeholder only.

[alembic]
script_location = %(here)s/alembic
prepend_sys_path = %(here)s
path_separator = os
version_path_separator = os
sqlalchemy.url = postgresql+asyncpg://company_brain:password@localhost:5433/company_brain

[post_write_hooks]
